{% load static %}
{% load django_vite %}
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nearby Drivers Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    {% vite_hmr_client %}
    {% vite_asset 'assets/taxi_map.ts' %}
    <style>
      html, body, #map { height: 100%; margin: 0; padding: 0; }
      .map-wrap { height: 100vh; }
      .leaflet-control-custom { background: white; padding: 8px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.4); }
      .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
      .btn-success { background: #198754; color: white; margin-right: 6px; }
      .btn-secondary { background: #6c757d; color: white; }
    </style>
  </head>
  <body>
    <div id="map" class="map-wrap"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{% static 'js/taxi_map.js' %}"></script>
  </body>
</html>
