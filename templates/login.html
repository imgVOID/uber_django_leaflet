{% load django_bootstrap5 %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    {% bootstrap_css %}
    <style>
      body { background: #f8f9fa; }
      .center { min-height: 100vh; display:flex; align-items:center; justify-content:center; }
      .card { width: 420px; padding: 24px; }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card shadow-sm bg-white rounded">
        <h1 class="h5 mb-3">Sign in</h1>
        <form method="post" action="{% url 'accounts:login' %}">
          {% csrf_token %}
          {% bootstrap_form form %}
          <div class="d-flex justify-content-end"><button class="btn btn-primary" type="submit">Login</button></div>
        </form>
        <div class="mt-3 small">No account? <a href="{% url 'accounts:register' %}">Register</a></div>
      </div>
    </div>
    {% bootstrap_javascript  %}
  </body>
</html>
