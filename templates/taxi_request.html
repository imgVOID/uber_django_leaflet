{% load django_vite %}
{% load django_bootstrap5 %}
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Request Taxi</title>
    {% vite_hmr_client %}
    {% bootstrap_css %}
    {% vite_asset 'assets/taxi_request.ts' %}
    <style>
      body { background: #eef2f5; }
      .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .card { width: 640px; padding: 28px; }
      .form-label { font-weight: 600; }
      /* Style for address autocomplete search results */
      .search-results { max-height: 150px; overflow-y: auto; z-index: 1000; position: absolute; width: 100%; shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .search-results .list-group-item { cursor: pointer; }
      .search-results .list-group-item:hover { background-color: #f1f3f5; }
      .position-relative-container { position: relative; }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card shadow-sm bg-white rounded">
        <h2 class="h5 mb-3">Request a Taxi</h2>
        <p class="small text-muted">Enter details to find available drivers nearby.</p>

        <form id="taxiForm">
          {% csrf_token %}
          <div class="row g-3">
            
            <div class="col-12 position-relative-container">
              <label for="from_addr" class="form-label">From</label>
              <div class="input-group">
                <input id="from_addr" class="form-control" placeholder="Pickup address or coordinates" required />
                <button id="checkFromBtn" type="button" class="btn btn-outline-primary" title="Verify pickup address">Check</button>
                <button id="useLocationBtn" type="button" class="btn btn-outline-secondary" title="Use my location">Use my location</button>
              </div>
              <div id="fromResults" class="list-group search-results d-none"></div>
            </div>
            
            <div class="col-12 position-relative-container">
              <label for="to_addr" class="form-label">Where</label>
              <div class="input-group">
                <input id="to_addr" class="form-control" placeholder="Destination address" required />
                <button id="checkToBtn" type="button" class="btn btn-outline-primary" title="Verify destination address">Check</button>
              </div>
              <div id="toResults" class="list-group search-results d-none"></div>
            </div>
            
            <div class="col-12 d-flex justify-content-between align-items-center">
              <small id="status" class="text-muted"></small>
              <button type="submit" class="btn btn-primary px-4">Find Drivers</button>
            </div>
          </div>
        </form>

        <div class="mt-4 pt-3 border-top">
          <h6 class="mb-1 text-secondary small">Last Request Trace</h6>
          <pre id="last" class="small text-break bg-light p-2 rounded">No requests yet.</pre>
        </div>
      </div>
    </div>

    {% bootstrap_javascript %}
  </body>
</html>
