<!DOCTYPE html>
<html>
<body>
    <h1>WebSocket speed and props test: {{ ride.id }}</h1>
    
    <form id="speedForm">
        {{ form.as_p }}
        <button type="button" id="sendBtn">Отправить</button>
    </form>

    <div id="log" style="border: 1px solid black; padding: 10px; margin-top: 10px;">
        <strong>Лог событий:</strong>
    </div>

    <script>
        const rideId = "{{ ride.id }}";
        const socket = new WebSocket(`ws://${window.location.host}/ws/speed/${rideId}/`);

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById('log').innerHTML += `<p>${JSON.stringify(data)}</p>`;
        };

        document.getElementById('sendBtn').onclick = () => {
            const speed = document.getElementById('speedInput').value;
            socket.send(JSON.stringify({ 'speed': parseFloat(speed) }));
        };
    </script>
</body>
</html>
